name: Publish to WinGet

on:
  release:
    types: [released]

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: GuoJikun.QuickLook
          installers-regex: '_x64-setup\.exe$|_arm64-setup\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
