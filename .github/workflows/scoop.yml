name: Update Scoop Manifest

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 0.21.0）'
        required: true

jobs:
  update-scoop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Scoop Extras fork
        uses: actions/checkout@v4
        with:
          repository: GuoJikun/Extras
          token: ${{ secrets.WINGET_TOKEN }}

      - name: Get release info
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            let version, x64_url, arm64_url;

            if (context.payload.release) {
              const release = context.payload.release;
              const x64Asset = release.assets.find(a => a.name.includes('x64-setup.exe'));
              const arm64Asset = release.assets.find(a => a.name.includes('arm64-setup.exe'));
              version = release.tag_name.replace('v', '');
              x64_url = x64Asset.browser_download_url;
              arm64_url = arm64Asset.browser_download_url;
            } else {
              version = '${{ github.event.inputs.version }}';
              x64_url = `https://github.com/GuoJikun/quicklook/releases/download/v${version}/quicklook_${version}_x64-setup.exe`;
              arm64_url = `https://github.com/GuoJikun/quicklook/releases/download/v${version}/quicklook_${version}_arm64-setup.exe`;
            }

            core.setOutput('version', version);
            core.setOutput('x64_url', x64_url);
            core.setOutput('arm64_url', arm64_url);

      - name: Download and hash installers
        id: hash
        run: |
          curl -sL "${{ steps.release.outputs.x64_url }}" -o x64-setup.exe
          curl -sL "${{ steps.release.outputs.arm64_url }}" -o arm64-setup.exe
          echo "x64_hash=$(sha256sum x64-setup.exe | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "arm64_hash=$(sha256sum arm64-setup.exe | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Write manifest
        run: |
          mkdir -p bucket
          cat > bucket/quicklook.json << 'MANIFEST'
          {
            "version": "PLACEHOLDER_VERSION",
            "description": "Windows 平台的文件快速预览工具，类似 macOS Quick Look",
            "homepage": "https://github.com/GuoJikun/quicklook",
            "license": "Apache-2.0",
            "architecture": {
              "64bit": {
                "url": "PLACEHOLDER_X64_URL",
                "hash": "PLACEHOLDER_X64_HASH"
              },
              "arm64": {
                "url": "PLACEHOLDER_ARM64_URL",
                "hash": "PLACEHOLDER_ARM64_HASH"
              }
            },
            "installer": {
              "script": "Start-Process \"$dir\\quicklook_$($version)_x64-setup.exe\" -ArgumentList '/S /D=$dir' -Wait"
            },
            "uninstaller": {
              "script": "Start-Process \"$dir\\uninstall.exe\" -ArgumentList '/S' -Wait"
            },
            "checkver": "github",
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/GuoJikun/quicklook/releases/download/v$version/quicklook_$version_x64-setup.exe"
                },
                "arm64": {
                  "url": "https://github.com/GuoJikun/quicklook/releases/download/v$version/quicklook_$version_arm64-setup.exe"
                }
              }
            }
          }
          MANIFEST

          sed -i "s|PLACEHOLDER_VERSION|${{ steps.release.outputs.version }}|g" bucket/quicklook.json
          sed -i "s|PLACEHOLDER_X64_URL|${{ steps.release.outputs.x64_url }}|g" bucket/quicklook.json
          sed -i "s|PLACEHOLDER_X64_HASH|${{ steps.hash.outputs.x64_hash }}|g" bucket/quicklook.json
          sed -i "s|PLACEHOLDER_ARM64_URL|${{ steps.release.outputs.arm64_url }}|g" bucket/quicklook.json
          sed -i "s|PLACEHOLDER_ARM64_HASH|${{ steps.hash.outputs.arm64_hash }}|g" bucket/quicklook.json

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.WINGET_TOKEN }}
          commit-message: "quicklook: update to v${{ steps.release.outputs.version }}"
          title: "quicklook: update to v${{ steps.release.outputs.version }}"
          body: |
            Automated update of QuickLook to v${{ steps.release.outputs.version }}

            Release: https://github.com/GuoJikun/quicklook/releases/tag/v${{ steps.release.outputs.version }}
          branch: quicklook-${{ steps.release.outputs.version }}
          base: master
